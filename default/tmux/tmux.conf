set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g status-position top

unbind C-b
unbind C-Space
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Enter visual / copy mode with prefix v
bind v copy-mode

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null"

# Tokyo-night statusbar
set -g status-style "fg=#a9b1d6,bg=#1a1b26"
set -g status-left  " #[fg=#7aa2f7,bold]#S #[fg=#787c99]│ "
set -g status-right "#[fg=#787c99]%H:%M  "
set -g status-left-length 40
setw -g window-status-format         " #[fg=#787c99]#I #W "
setw -g window-status-current-format " #[fg=#1a1b26,bg=#7aa2f7,bold] #I #W "
set -g pane-border-style        "fg=#32344a"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "fg=#1a1b26,bg=#e0af68,bold"

# Session save/restore via tmux-resurrect (manual: prefix Ctrl-s / Ctrl-r)
if-shell '[ -d ~/.tmux/plugins/tmux-resurrect ]' \
  'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
